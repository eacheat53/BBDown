name: 功能请求
about: 提议新功能或改进
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提出功能建议！请确保在提交前已完成以下检查：
        - 已搜索 [现有 Issue](https://github.com/AliverAnme/BBDown/issues) 确认未被提议过
        - 已阅读 README 确认该功能尚未实现

  - type: textarea
    id: problem
    attributes:
      label: 你的需求 / 遇到的问题
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案（如有）

  - type: textarea
    id: context
    attributes:
      label: 补充说明

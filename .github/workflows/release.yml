name: Build Release

on:
  push:
    tags:
      - "v*"

env:
  DOTNET_SDK_VERSION: "10.0.300"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-win-x64-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Install zip
        run: choco install zip --no-progress --yes

      - name: Publish [win-x64]
        run: dotnet publish BBDown -r win-x64 -c Release -o artifact-win-x64

      - name: Publish [win-arm64]
        run: dotnet publish BBDown -r win-arm64 -c Release -o artifact-win-arm64

      - name: Package [win]
        run: |
          $ver = "${{ github.ref_name }}"
          cd artifact-win-x64
          zip ../BBDown_${ver}_win-x64.zip BBDown.exe
          cd ../artifact-win-arm64
          zip ../BBDown_${ver}_win-arm64.zip BBDown.exe

      - name: Upload Artifact [win-x64]
        uses: actions/upload-artifact@v5
        with:
          name: BBDown_win-x64
          path: BBDown_${{ github.ref_name }}_win-x64.zip

      - name: Upload Artifact [win-arm64]
        uses: actions/upload-artifact@v5
        with:
          name: BBDown_win-arm64
          path: BBDown_${{ github.ref_name }}_win-arm64.zip

  build-linux-x64-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build x64 in Ubuntu 18.04 container (for glibc 2.27 compatibility)
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            ubuntu:18.04 \
            bash -c "
              set -e
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y wget build-essential clang libicu-dev zlib1g libcurl4-openssl-dev libkrb5-dev
              DOTNET_SDK_VERSION='${{ env.DOTNET_SDK_VERSION }}'
              DOTNET_SDK_URL=\"https://builds.dotnet.microsoft.com/dotnet/Sdk/\${DOTNET_SDK_VERSION}/dotnet-sdk-\${DOTNET_SDK_VERSION}-linux-x64.tar.gz\"
              wget -nv \"\$DOTNET_SDK_URL\" -O dotnet-sdk.tar.gz
              mkdir -p /opt/dotnet
              tar -xzf dotnet-sdk.tar.gz -C /opt/dotnet
              export PATH=\"/opt/dotnet:\$PATH\"
              dotnet publish BBDown -r linux-x64 -c Release -o /workspace/artifact-linux-x64
            "

      - name: Build arm64 in Ubuntu 18.04 container (for glibc 2.27 compatibility)
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            mcr.microsoft.com/dotnet-buildtools/prereqs:ubuntu-18.04-cross-arm64-20220312201346-b2c2436 \
            bash -c "
              set -e
              DOTNET_SDK_VERSION='${{ env.DOTNET_SDK_VERSION }}'
              DOTNET_SDK_URL=\"https://builds.dotnet.microsoft.com/dotnet/Sdk/\${DOTNET_SDK_VERSION}/dotnet-sdk-\${DOTNET_SDK_VERSION}-linux-x64.tar.gz\"
              wget -nv \"\$DOTNET_SDK_URL\" -O dotnet-sdk.tar.gz
              mkdir -p /opt/dotnet
              tar -xzf dotnet-sdk.tar.gz -C /opt/dotnet
              export PATH=\"/opt/dotnet:\$PATH\"
              dotnet publish BBDown -r linux-arm64 -c Release -p:StripSymbols=true -p:CppCompilerAndLinker=clang-9 -p:SysRoot=/crossrootfs/arm64 -o /workspace/artifact-linux-arm64
            "

      - name: Package [linux]
        run: |
          cd artifact-linux-x64
          zip ../BBDown_${{ github.ref_name }}_linux-x64.zip BBDown
          cd ../artifact-linux-arm64
          zip ../BBDown_${{ github.ref_name }}_linux-arm64.zip BBDown

      - name: Upload Artifact [linux-x64]
        uses: actions/upload-artifact@v5
        with:
          name: BBDown_linux-x64
          path: BBDown_${{ github.ref_name }}_linux-x64.zip

      - name: Upload Artifact [linux-arm64]
        uses: actions/upload-artifact@v5
        with:
          name: BBDown_linux-arm64
          path: BBDown_${{ github.ref_name }}_linux-arm64.zip

  build-mac-x64-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Publish [osx-x64]
        run: dotnet publish BBDown -r osx-x64 -c Release -o artifact-osx-x64

      - name: Publish [osx-arm64]
        run: dotnet publish BBDown -r osx-arm64 -c Release -o artifact-osx-arm64

      - name: Package [osx]
        run: |
          cd artifact-osx-x64
          zip ../BBDown_${{ github.ref_name }}_osx-x64.zip BBDown
          cd ../artifact-osx-arm64
          zip ../BBDown_${{ github.ref_name }}_osx-arm64.zip BBDown

      - name: Upload Artifact [osx-x64]
        uses: actions/upload-artifact@v5
        with:
          name: BBDown_osx-x64
          path: BBDown_${{ github.ref_name }}_osx-x64.zip

      - name: Upload Artifact [osx-arm64]
        uses: actions/upload-artifact@v5
        with:
          name: BBDown_osx-arm64
          path: BBDown_${{ github.ref_name }}_osx-arm64.zip

  create-release:
    runs-on: ubuntu-latest
    needs: [build-win-x64-arm64, build-linux-x64-arm64, build-mac-x64-arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Build release notes
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo "")

          # Extract changelog section for this version
          NOTES_FILE=$(mktemp)
          {
            # Changelog for this version
            if [ -f CHANGELOG.md ]; then
              awk "/^## \\[$VERSION\\]/{flag=1; next} /^## \\[/{if(flag) exit} flag" CHANGELOG.md
            fi

            echo ""
            echo "---"
            echo ""

            # Commits since previous tag
            echo "## Commits"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:'- %s' --no-merges "$PREV_TAG..$TAG" || true
            else
              echo "Initial release."
            fi
            echo ""

            # Downloads table
            echo "## Downloads"
            echo ""
            echo "| Platform | Architecture |"
            echo "|----------|-------------|"
            echo "| Windows  | x64, arm64  |"
            echo "| Linux    | x64, arm64  |"
            echo "| macOS    | x64, arm64  |"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
            fi
          } >> "$NOTES_FILE"

          # Use gh CLI to create release with notes from file
          gh release create "$TAG" \
            --title "BBDown ${TAG}" \
            --notes-file "$NOTES_FILE" \
            ${{ contains(github.ref_name, '-') && '--prerelease' || '' }} \
            artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
